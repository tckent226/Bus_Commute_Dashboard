<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Slog Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c; --surface: #1a1916; --border: #2e2c28;
    --text: #e8e4dc; --muted: #7a7568;
    --accent: #e8a844; --accent2: #6ab0d4; --accent3: #c67a5c;
    --green: #7ab87a; --red: #c47070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; min-height: 100vh; }

  header { padding: 40px 40px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; }
  header h1 { font-family: 'Fraunces', serif; font-size: 42px; font-weight: 300; line-height: 1; }
  header h1 span { color: var(--accent); font-style: italic; }
  .header-meta { color: var(--muted); font-size: 11px; text-align: right; line-height: 1.8; }

  .main { padding: 32px 40px; display: flex; flex-direction: column; gap: 32px; }

  .loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 16px; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; }
  .error-msg { color: var(--red); font-size: 12px; text-align: center; padding: 40px; line-height: 2; }

  .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); padding: 20px; position: relative; overflow: hidden; }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
  .kpi.blue::before { background: var(--accent2); }
  .kpi.orange::before { background: var(--accent3); }
  .kpi.green::before { background: var(--green); }
  .kpi.red::before { background: var(--red); }
  .kpi-label { color: var(--muted); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
  .kpi-value { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 600; line-height: 1; }
  .kpi-sub { color: var(--muted); font-size: 11px; margin-top: 6px; }

  .section-title { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); padding: 24px; }

  table { width: 100%; border-collapse: collapse; }
  thead th { color: var(--muted); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 10px 12px; }
  .tag { display: inline-block; padding: 2px 8px; font-size: 10px; border-radius: 2px; }
  .tag-morning { background: rgba(232,168,68,0.15); color: var(--accent); }
  .tag-night { background: rgba(106,176,212,0.15); color: var(--accent2); }

  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 12px; }
  .bar-label { width: 90px; color: var(--muted); font-size: 11px; flex-shrink: 0; text-align: right; }
  .bar-track { flex: 1; height: 20px; background: rgba(255,255,255,0.04); overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 11px; color: var(--bg); font-weight: 500; min-width: 44px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }
  .bar-fill.blue { background: var(--accent2); }
  .bar-fill.orange { background: var(--accent3); }

  .dot-grid { display: flex; flex-wrap: wrap; gap: 4px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; cursor: default; transition: transform 0.1s; }
  .dot:hover { transform: scale(1.6); }

  .timeline { display: flex; flex-direction: column; max-height: 320px; overflow-y: auto; }
  .tl-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .tl-row:last-child { border-bottom: none; }
  .tl-date { width: 80px; color: var(--muted); font-size: 11px; flex-shrink: 0; }
  .tl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tl-duration { font-size: 12px; font-weight: 500; }
  .tl-meta { color: var(--muted); font-size: 10px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .delay-pos { color: var(--red); }
  .delay-neg { color: var(--green); }
  .delay-zero { color: var(--muted); }

  .refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .star-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 0 4px; opacity: 0.3; transition: opacity 0.15s, transform 0.15s; line-height: 1; }
  .star-btn:hover { opacity: 0.7; transform: scale(1.2); }
  .star-btn.active { opacity: 1; }
  .filter-fav-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
  .filter-fav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-fav-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,168,68,0.08); }

  footer { padding: 24px 40px; border-top: 1px solid var(--border); color: var(--muted); font-size: 10px; letter-spacing: 0.08em; }
  .highlight { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div>
    <h1>The <span>Slog</span> Dashboard</h1>
    <div style="color:var(--muted);font-size:12px;margin-top:8px;">Apple Bus Commute · Live from Google Sheets</div>
  </div>
  <div class="header-meta">
    <div id="last-ride">—</div>
    <div id="data-range">—</div>
    <button class="refresh-btn" onclick="loadData()" style="margin-top:8px;">↻ Refresh</button>
  </div>
</header>

<div class="main" id="main-content">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p>Fetching your commute data...</p>
  </div>
</div>

<footer>
  Built with Claude · Live data from Google Sheets · <span class="highlight" id="footer-count">—</span> rides tracked
</footer>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPYAS1Gozs78ECRNOJp7hgg_iIjFb0PYGttKoRNoeHG_JcBklOf1YZS60OgcA7927IjkGLAyB2ugSb/pub?gid=0&single=true&output=csv';

function parseDuration(s) {
  if (!s || s.includes('#') || s.trim() === '' || s.trim() === '0:00') return null;
  const neg = s.trim().startsWith('-');
  const clean = s.replace('-','').trim();
  const parts = clean.split(':');
  if (parts.length < 2) return null;
  const mins = parseInt(parts[0]) * 60 + parseInt(parts[1]);
  if (isNaN(mins) || mins === 0) return null;
  return neg ? -mins : mins;
}

function fmtMins(mins) {
  if (mins === null || isNaN(mins)) return '—';
  const h = Math.floor(Math.abs(mins) / 60);
  const m = Math.abs(mins) % 60;
  return `${mins < 0 ? '-' : ''}${h}:${String(m).padStart(2,'0')}`;
}

function avg(arr) { return arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : 0; }

function dotColor(mins) {
  if (mins < 80) return 'var(--green)';
  if (mins < 100) return 'var(--accent)';
  if (mins < 115) return 'var(--accent3)';
  return 'var(--red)';
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = [];
  for (const line of lines) {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += line[i]; }
    }
    cols.push(cur.trim());

    const dow = cols[1]?.trim();
    const tod = cols[2]?.trim();
    const date = cols[5]?.trim();
    const pickup = cols[6]?.trim();
    const delay = parseDuration(cols[9]?.trim());
    const actualDur = parseDuration(cols[12]?.trim());

    if (!['T','W','R'].includes(dow)) continue;
    if (!['Morning','Night'].includes(tod)) continue;
    if (!actualDur) continue;

    rows.push({ dow, tod, date, pickup, delay, actualDur });
  }
  return rows;
}

function render(rows) {
  const totalMins = rows.reduce((s,r) => s + r.actualDur, 0);
  const totalHours = totalMins / 60;
  const totalDays = totalHours / 24;
  const avgDur = avg(rows.map(r => r.actualDur));
  const minRow = rows.reduce((a,b) => a.actualDur < b.actualDur ? a : b);
  const maxRow = rows.reduce((a,b) => a.actualDur > b.actualDur ? a : b);

  document.getElementById('last-ride').textContent = 'Last ride: ' + rows[rows.length-1].date;
  document.getElementById('data-range').textContent = rows.length + ' rides loaded';
  document.getElementById('footer-count').textContent = rows.length;

  // Route table with favorites
  const byPickup = {};
  for (const r of rows) {
    const key = r.pickup || 'Unknown';
    if (!byPickup[key]) byPickup[key] = { durations: [], delays: [], tod: r.tod };
    byPickup[key].durations.push(r.actualDur);
    if (r.delay !== null) byPickup[key].delays.push(r.delay);
  }
  const routeEntries = Object.entries(byPickup).sort((a,b) => {
    const toMin = t => {
      const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (!m) return 9999;
      let h = parseInt(m[1]), mn = parseInt(m[2]);
      if (m[3].toUpperCase()==='PM' && h!==12) h += 12;
      if (m[3].toUpperCase()==='AM' && h===12) h = 0;
      return h*60+mn;
    };
    return toMin(a[0]) - toMin(b[0]);
  });

  function buildRouteTable(filterFavs) {
    const favs = getFavs();
    let html = `<table><thead><tr>
      <th></th><th>Departure</th><th>TOD</th><th>Rides</th><th>Avg</th><th>Max</th><th>Min</th><th>Avg Delay</th>
    </tr></thead><tbody>`;
    for (const [pickup, data] of routeEntries) {
      const isFav = favs.includes(pickup);
      if (filterFavs && !isFav) continue;
      const n = data.durations.length;
      const a = Math.round(avg(data.durations));
      const mx = Math.max(...data.durations);
      const mn = Math.min(...data.durations);
      const d = data.delays.length ? Math.round(avg(data.delays)) : null;
      const dClass = d > 5 ? 'delay-pos' : d < -5 ? 'delay-neg' : 'delay-zero';
      html += `<tr>
        <td><button class="star-btn ${isFav?'active':''}" onclick="toggleFav('${pickup.replace(/'/g,"\\'")}', this)" title="Mark as favorite">★</button></td>
        <td>${pickup}</td>
        <td><span class="tag ${data.tod==='Morning'?'tag-morning':'tag-night'}">${data.tod}</span></td>
        <td>${n}</td><td>${fmtMins(a)}</td><td>${fmtMins(mx)}</td><td>${fmtMins(mn)}</td>
        <td class="${dClass}">${d!==null?(d>=0?'+':'')+fmtMins(d):'—'}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    return html;
  }

  window._buildRouteTable = buildRouteTable;
  const tableHTML = buildRouteTable(false);

  // Morning vs Night duration
  const morning = rows.filter(r => r.tod==='Morning');
  const night = rows.filter(r => r.tod==='Night');
  const avgM = Math.round(avg(morning.map(r=>r.actualDur)));
  const avgN = Math.round(avg(night.map(r=>r.actualDur)));
  const maxMN = Math.max(avgM,avgN)*1.2;
  const mnBars = [
    {label:'Morning',val:avgM,cls:''},
    {label:'Night',val:avgN,cls:'blue'}
  ].map(d=>`<div class="bar-row">
    <div class="bar-label">${d.label}</div>
    <div class="bar-track"><div class="bar-fill ${d.cls}" style="width:${(d.val/maxMN*100).toFixed(1)}%">${fmtMins(d.val)}</div></div>
  </div>`).join('');

  // DOW bars
  const dowMap = {T:'Tuesday',W:'Wednesday',R:'Thursday'};
  const dowMaxVal = Math.max(...['T','W','R'].map(d=>avg(rows.filter(r=>r.dow===d).map(r=>r.actualDur))))*1.15;
  const dowBars = ['T','W','R'].map((d,i)=>{
    const rides = rows.filter(r=>r.dow===d);
    const val = Math.round(avg(rides.map(r=>r.actualDur)));
    const cls = i===1?'blue':i===2?'orange':'';
    return `<div class="bar-row">
      <div class="bar-label">${dowMap[d]}</div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${(val/dowMaxVal*100).toFixed(1)}%">${fmtMins(val)}</div></div>
    </div>
    <div style="display:flex;gap:12px;margin-top:-6px;margin-bottom:6px">
      <div style="width:90px;flex-shrink:0"></div>
      <div style="font-size:10px;color:var(--muted);padding-left:4px">${rides.length} rides</div>
    </div>`;
  }).join('');

  // Recent rides
  const recentHTML = [...rows].slice(-20).reverse().map(r=>{
    const c = dotColor(r.actualDur);
    const delayTxt = r.delay!==null?(r.delay>=0?`+${fmtMins(r.delay)}`:fmtMins(r.delay)):'';
    const dClass = r.delay>5?'delay-pos':r.delay<-5?'delay-neg':'delay-zero';
    return `<div class="tl-row">
      <div class="tl-date">${r.date}</div>
      <div class="tl-dot" style="background:${c}"></div>
      <div>
        <div class="tl-duration">${fmtMins(r.actualDur)}</div>
        <div class="tl-meta">${r.dow==='T'?'Tue':r.dow==='W'?'Wed':'Thu'} · ${r.tod}${delayTxt?` · <span class="${dClass}">${delayTxt}</span>`:''}</div>
      </div>
    </div>`;
  }).join('');

  // Dot matrix
  const dots = rows.map(r=>`<div class="dot" style="background:${dotColor(r.actualDur)}" title="${r.date} ${r.tod}: ${fmtMins(r.actualDur)}"></div>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Total Rides</div><div class="kpi-value">${rows.length}</div><div class="kpi-sub">all recorded rides</div></div>
      <div class="kpi blue"><div class="kpi-label">Total Hours on Bus</div><div class="kpi-value">${totalHours.toFixed(1)}h</div><div class="kpi-sub">${totalDays.toFixed(1)} full days of your life</div></div>
      <div class="kpi orange"><div class="kpi-label">Avg Ride Duration</div><div class="kpi-value">${fmtMins(Math.round(avgDur))}</div><div class="kpi-sub">across all routes & times</div></div>
      <div class="kpi green"><div class="kpi-label">Best Ride</div><div class="kpi-value">${fmtMins(minRow.actualDur)}</div><div class="kpi-sub">${minRow.date} · ${minRow.tod}</div></div>
      <div class="kpi red"><div class="kpi-label">Worst Ride</div><div class="kpi-value">${fmtMins(maxRow.actualDur)}</div><div class="kpi-sub">${maxRow.date} · ${maxRow.tod}</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;">
          <span>By Route (Departure Time)</span>
          <button class="filter-fav-btn" id="fav-filter-btn" onclick="toggleFavFilter()">★ Favorites only</button>
        </div>
        <div id="route-table-wrap">${tableHTML}</div>
      </div>
      <div class="card">
        <div class="section-title">Morning vs Night · Avg Duration</div>
        <div class="bar-chart">${mnBars}</div>
      </div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="section-title">By Day of Week · Avg Duration</div><div class="bar-chart">${dowBars}</div></div>
      <div class="card"><div class="section-title">Recent Rides</div><div class="timeline">${recentHTML}</div></div>
    </div>
    <div class="card">
      <div class="section-title">Every Ride · Duration Heatmap &nbsp;
        <span style="font-size:10px;color:var(--muted)">
          <span style="color:var(--green)">●</span> &lt;1:20 &nbsp;
          <span style="color:var(--accent)">●</span> 1:20–1:40 &nbsp;
          <span style="color:var(--accent3)">●</span> 1:40–1:55 &nbsp;
          <span style="color:var(--red)">●</span> &gt;1:55
        </span>
      </div>
      <div class="dot-grid">${dots}</div>
    </div>
  `;
}

function getFavs() {
  try { return JSON.parse(localStorage.getItem('bus_favs') || '[]'); } catch { return []; }
}

function toggleFav(pickup, btn) {
  let favs = getFavs();
  if (favs.includes(pickup)) {
    favs = favs.filter(f => f !== pickup);
    btn.classList.remove('active');
  } else {
    favs.push(pickup);
    btn.classList.add('active');
  }
  localStorage.setItem('bus_favs', JSON.stringify(favs));
  // If filter is active, rebuild table
  const filterBtn = document.getElementById('fav-filter-btn');
  if (filterBtn && filterBtn.classList.contains('active')) {
    document.getElementById('route-table-wrap').innerHTML = window._buildRouteTable(true);
  }
}

function toggleFavFilter() {
  const btn = document.getElementById('fav-filter-btn');
  btn.classList.toggle('active');
  const isFiltering = btn.classList.contains('active');
  document.getElementById('route-table-wrap').innerHTML = window._buildRouteTable(isFiltering);
}

async function loadData() {
  document.getElementById('main-content').innerHTML = `<div class="loading"><div class="loading-spinner"></div><p>Fetching your commute data...</p></div>`;
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length === 0) throw new Error('No valid ride data found');
    render(rows);
  } catch(err) {
    document.getElementById('main-content').innerHTML = `<div class="error-msg">⚠ Could not load data from Google Sheets.<br><span style="font-size:11px">Make sure the sheet is published to web and try refreshing.<br>Error: ${err.message}</span></div>`;
  }
}

loadData();
</script>
</body>
</html>
