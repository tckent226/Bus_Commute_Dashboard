<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tk's Bus Grind</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c; --surface: #1a1916; --border: #2e2c28;
    --text: #e8e4dc; --muted: #7a7568;
    --accent: #e8a844;
    --morning: #f5c842;
    --night: #3a5a8c;
    --green: #7ab87a; --red: #c47070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; min-height: 100vh; }

  header { padding: 40px 40px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; }
  header h1 { font-family: 'Fraunces', serif; font-size: 42px; font-weight: 300; line-height: 1; }
  header h1 span { color: var(--accent); font-style: italic; }
  .header-meta { color: var(--muted); font-size: 11px; text-align: right; line-height: 1.8; }
  .main { padding: 32px 40px; display: flex; flex-direction: column; gap: 32px; }

  .loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 16px; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 12px; }
  .error-msg { color: var(--red); font-size: 12px; text-align: center; padding: 40px; line-height: 2; }

  /* KPI row */
  .kpi-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); padding: 20px; position: relative; overflow: hidden; }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
  .kpi.morning-top::before { background: var(--morning); }
  .kpi.night-top::before { background: var(--night); }
  .kpi.blue::before { background: #6ab0d4; }
  .kpi.green::before { background: var(--green); }
  .kpi.red::before { background: var(--red); }
  .kpi-label { color: var(--muted); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
  .kpi-value { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; line-height: 1; }
  .kpi-sub { color: var(--muted); font-size: 11px; margin-top: 6px; }
  .kpi-sub-detail { font-size: 10px; margin-top: 8px; }

  .ride-stat-row { display: flex; gap: 20px; margin-top: 6px; }
  .ride-stat { flex: 1; }
  .ride-stat-label { color: var(--muted); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
  .ride-stat-val { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; line-height: 1; }
  .ride-stat-meta { color: var(--muted); font-size: 10px; margin-top: 2px; }
  .ride-stat-divider { width: 1px; background: var(--border); }

  .mn-bar-wrap { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .mn-bar-row { display: flex; align-items: center; gap: 8px; }
  .mn-bar-lbl { font-size: 10px; width: 52px; flex-shrink: 0; }
  .mn-bar-lbl.morning { color: var(--morning); }
  .mn-bar-lbl.night { color: var(--night); }
  .mn-bar-track { flex: 1; height: 14px; background: rgba(255,255,255,0.04); overflow: hidden; }
  .mn-bar-fill { height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 10px; color: rgba(0,0,0,0.8); font-weight: 500; min-width: 36px; }

  .section-title { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); padding: 24px; }

  table { width: 100%; border-collapse: collapse; }
  thead th { color: var(--muted); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 10px 12px; }
  .tag { display: inline-block; padding: 2px 8px; font-size: 10px; border-radius: 2px; }
  .tag-morning { background: rgba(245,200,66,0.15); color: var(--morning); }
  .tag-night { background: rgba(58,90,140,0.25); color: #7aaae0; }

  /* Vertical stacked bar chart */
  .vert-chart-wrap { display: flex; flex-direction: column; gap: 12px; }
  .vert-chart { display: flex; align-items: flex-end; gap: 8px; height: 252px; }
  .vert-col-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .vert-col { width: 100%; display: flex; flex-direction: column; justify-content: flex-end; height: 224px; }
  .vert-seg { width: 100%; transition: height 0.8s cubic-bezier(0.16,1,0.3,1); }
  .vert-lbl { font-size: 9px; color: var(--muted); text-align: center; line-height: 1.3; }
  .vert-total { font-size: 9px; color: var(--muted); margin-bottom: 2px; }
  .stacked-legend { display: flex; gap: 16px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* Trend line chart */
  .trend-controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .route-pill { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; border-radius: 2px; transition: all 0.15s; white-space: nowrap; }
  .route-pill:hover { border-color: var(--accent); color: var(--accent); }
  .route-pill.active-morning { border-color: var(--morning); color: var(--morning); background: rgba(245,200,66,0.08); }
  .route-pill.active-night { border-color: #7aaae0; color: #7aaae0; background: rgba(58,90,140,0.15); }
  .trend-canvas-wrap { position: relative; }
  canvas#trendCanvas { width: 100%; display: block; }
  .trend-empty { color: var(--muted); font-size: 11px; padding: 40px 0; text-align: center; }
  .trend-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .trend-legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; }

  .trend-toggle { display: flex; gap: 0; }
  .trend-toggle-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 3px 10px; font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; transition: all 0.15s; }
  .trend-toggle-btn:first-child { border-radius: 2px 0 0 2px; border-right: none; }
  .trend-toggle-btn:last-child { border-radius: 0 2px 2px 0; }
  .trend-toggle-btn.active { background: rgba(232,168,68,0.1); border-color: var(--accent); color: var(--accent); }
  .trend-toggle-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

  .timeline { display: flex; flex-direction: column; max-height: 380px; overflow-y: auto; }
  .tl-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .tl-row:last-child { border-bottom: none; }
  .tl-date { width: 80px; color: var(--muted); font-size: 11px; flex-shrink: 0; }
  .tl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tl-duration { font-size: 12px; font-weight: 500; }
  .tl-meta { color: var(--muted); font-size: 10px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .delay-pos { color: var(--red); }
  .delay-neg { color: var(--green); }
  .delay-zero { color: var(--muted); }

  .refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .star-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 0 4px; color: var(--muted); transition: color 0.15s, transform 0.15s; line-height: 1; }
  .star-btn:hover { color: var(--accent); transform: scale(1.2); }
  .star-btn.active { color: var(--accent); }
  .filter-fav-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
  .filter-fav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-fav-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,168,68,0.08); }

  footer { padding: 24px 40px; border-top: 1px solid var(--border); color: var(--muted); font-size: 10px; }
  .highlight { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div>
    <h1>Tk's <span>Bus Grind</span></h1>
    <div style="color:var(--muted);font-size:12px;margin-top:8px;">Apple Bus Commute · Live from Google Sheets</div>
  </div>
  <div class="header-meta">
    <div id="last-ride">—</div>
    <div id="data-range">—</div>
    <button class="refresh-btn" onclick="loadData()" style="margin-top:8px;">↻ Refresh</button>
  </div>
</header>

<div class="main" id="main-content">
  <div class="loading"><div class="loading-spinner"></div><p>Fetching your commute data...</p></div>
</div>

<footer>Built with Claude · Live data from Google Sheets · <span class="highlight" id="footer-count">—</span> rides tracked</footer>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPYAS1Gozs78ECRNOJp7hgg_iIjFb0PYGttKoRNoeHG_JcBklOf1YZS60OgcA7927IjkGLAyB2ugSb/pub?gid=0&single=true&output=csv';
const MORNING_COLOR = '#f5c842';
const NIGHT_COLOR   = '#3a6aad';
const MORNING_BG    = 'rgba(245,200,66,0.08)';
const NIGHT_BG      = 'rgba(58,106,173,0.15)';

let selectedRoutes = [];
let allRows = [];

function parseDuration(s) {
  if (!s || s.includes('#') || s.trim() === '' || s.trim() === '0:00') return null;
  const neg = s.trim().startsWith('-');
  const clean = s.replace('-','').trim();
  const parts = clean.split(':');
  if (parts.length < 2) return null;
  const mins = parseInt(parts[0]) * 60 + parseInt(parts[1]);
  if (isNaN(mins) || mins === 0) return null;
  return neg ? -mins : mins;
}
function fmtMins(mins) {
  if (mins === null || isNaN(mins)) return '—';
  const h = Math.floor(Math.abs(mins) / 60), m = Math.abs(mins) % 60;
  return `${mins < 0 ? '-' : ''}${h}:${String(m).padStart(2,'0')}`;
}
function avg(arr) { return arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : 0; }
function dotColor(mins) {
  if (mins < 80) return 'var(--green)'; if (mins < 100) return 'var(--accent)';
  if (mins < 115) return '#c67a5c'; return 'var(--red)';
}
function getBucket(mins) {
  if (mins < 70) return 0; if (mins < 85) return 1; if (mins < 95) return 2;
  if (mins < 110) return 3; return 4;
}
const bucketLabels = ['<1:10','1:10–1:25','1:25–1:35','1:35–1:50','1:50+'];

function parseCSV(text) {
  const lines = text.trim().split('\n'); const rows = [];
  for (const line of lines) {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += line[i]; }
    }
    cols.push(cur.trim());
    const dow = cols[1]?.trim(), tod = cols[2]?.trim(), date = cols[5]?.trim(), pickup = cols[6]?.trim();
    const delay = parseDuration(cols[9]?.trim()), actualDur = parseDuration(cols[12]?.trim());
    if (!['T','W','R'].includes(dow) || !['Morning','Night'].includes(tod) || !actualDur) continue;
    rows.push({ dow, tod, date, pickup, delay, actualDur });
  }
  return rows;
}

function toTimeMinutes(t) {
  const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 9999;
  let h = parseInt(m[1]), mn = parseInt(m[2]);
  if (m[3].toUpperCase()==='PM' && h!==12) h+=12;
  if (m[3].toUpperCase()==='AM' && h===12) h=0;
  return h*60+mn;
}

// ---- TREND CHART ----
let trendMode = 'chrono'; // 'chrono' | 'count'

function setTrendMode(mode) {
  trendMode = mode;
  document.getElementById('trendToggleChrono').classList.toggle('active', mode === 'chrono');
  document.getElementById('trendToggleCount').classList.toggle('active', mode === 'count');
  drawTrend();
}

function drawTrend() {
  const canvas = document.getElementById('trendCanvas');
  const emptyMsg = document.getElementById('trendEmpty');
  const legendWrap = document.getElementById('trendLegend');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = 260;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  if (selectedRoutes.length === 0) {
    emptyMsg.style.display = 'block'; legendWrap.innerHTML = ''; return;
  }
  emptyMsg.style.display = 'none';

  const PAD = { top: 16, right: 16, bottom: 36, left: 40 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;

  const series = selectedRoutes.map(pickup => {
    const rides = allRows.filter(r => r.pickup === pickup).sort((a,b) => new Date(a.date) - new Date(b.date));
    const tod = rides[0]?.tod || 'Morning';
    return { pickup, rides, tod, color: tod === 'Morning' ? MORNING_COLOR : NIGHT_COLOR };
  });

  const allDurs = series.flatMap(s => s.rides.map(r => r.actualDur));
  const minD = Math.max(0, Math.min(...allDurs) - 5);
  const maxD = Math.max(...allDurs) + 5;
  const yOf = d => PAD.top + chartH - ((d - minD) / (maxD - minD)) * chartH;

  // Y grid lines
  const yTicks = 4;
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  for (let i = 0; i <= yTicks; i++) {
    const y = PAD.top + (i / yTicks) * chartH;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + chartW, y); ctx.stroke();
    const val = maxD - ((maxD - minD) * i / yTicks);
    ctx.fillStyle = 'rgba(122,117,104,0.7)'; ctx.font = `9px 'DM Mono', monospace`;
    ctx.textAlign = 'right'; ctx.fillText(fmtMins(Math.round(val)), PAD.left - 4, y + 3);
  }

  if (trendMode === 'chrono') {
    // ---- CHRONOLOGICAL MODE ----
    // Find overall date range across all selected series
    const allDates = series.flatMap(s => s.rides.map(r => new Date(r.date)));
    const minDate = new Date(Math.min(...allDates));
    const maxDate = new Date(Math.max(...allDates));
    const dateRange = maxDate - minDate || 1;

    const xOfDate = d => PAD.left + ((new Date(d) - minDate) / dateRange) * chartW;

    // Draw lines
    for (const s of series) {
      if (s.rides.length === 0) continue;
      ctx.beginPath(); ctx.strokeStyle = s.color; ctx.lineWidth = 2;
      s.rides.forEach((r, i) => {
        const x = xOfDate(r.date), y = yOf(r.actualDur);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
      s.rides.forEach(r => {
        ctx.beginPath(); ctx.arc(xOfDate(r.date), yOf(r.actualDur), 2.5, 0, Math.PI * 2);
        ctx.fillStyle = s.color; ctx.fill();
      });
    }

    // X axis: month labels — "Nov 1", "Dec 1", etc.
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let d = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
    ctx.fillStyle = 'rgba(122,117,104,0.7)'; ctx.font = `9px 'DM Mono', monospace`; ctx.textAlign = 'center';
    while (d <= maxDate) {
      const x = xOfDate(d);
      if (x >= PAD.left && x <= PAD.left + chartW) {
        ctx.beginPath(); ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
        ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top + chartH); ctx.stroke();
        ctx.fillStyle = 'rgba(122,117,104,0.7)';
        ctx.fillText(`${MONTHS[d.getMonth()]} 1`, x, H - 6);
      }
      d = new Date(d.getFullYear(), d.getMonth() + 1, 1);
    }

  } else {
    // ---- ABSOLUTE COUNT MODE ----
    const maxCount = Math.max(...series.map(s => s.rides.length), 1);
    const xOf = (i, total) => PAD.left + (maxCount <= 1 ? chartW / 2 : (i / (maxCount - 1)) * chartW);

    for (const s of series) {
      if (s.rides.length === 0) continue;
      ctx.beginPath(); ctx.strokeStyle = s.color; ctx.lineWidth = 2;
      s.rides.forEach((r, i) => {
        const x = xOf(i, maxCount), y = yOf(r.actualDur);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
      s.rides.forEach((r, i) => {
        ctx.beginPath(); ctx.arc(xOf(i, maxCount), yOf(r.actualDur), 2.5, 0, Math.PI * 2);
        ctx.fillStyle = s.color; ctx.fill();
      });
    }

    // X axis: increments of 10
    ctx.fillStyle = 'rgba(122,117,104,0.7)'; ctx.font = `9px 'DM Mono', monospace`; ctx.textAlign = 'center';
    const step = 10;
    for (let i = 0; i <= maxCount; i += step) {
      const x = PAD.left + (maxCount <= 1 ? chartW / 2 : (i / (maxCount - 1)) * chartW);
      ctx.beginPath(); ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
      ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top + chartH); ctx.stroke();
      ctx.fillStyle = 'rgba(122,117,104,0.7)';
      ctx.fillText(i === 0 ? '1' : i, x, H - 6);
    }
  }

  legendWrap.innerHTML = series.map(s =>
    `<div class="trend-legend-item">
      <div style="width:16px;height:2px;background:${s.color};flex-shrink:0;border-radius:1px"></div>
      <span style="color:${s.color}">${s.pickup}</span>
      <span style="color:var(--muted)">(${s.rides.length} rides)</span>
    </div>`
  ).join('');
}

function toggleRoute(pickup, tod, btn) {
  const isActive = selectedRoutes.includes(pickup);
  if (isActive) {
    selectedRoutes = selectedRoutes.filter(r => r !== pickup);
    btn.className = 'route-pill';
  } else {
    if (selectedRoutes.length >= 6) {
      btn.style.animation = 'none'; btn.offsetHeight;
      btn.style.borderColor = 'var(--red)'; btn.style.color = 'var(--red)';
      setTimeout(() => { btn.style.borderColor = ''; btn.style.color = ''; }, 800);
      return;
    }
    selectedRoutes.push(pickup);
    btn.className = `route-pill active-${tod.toLowerCase()}`;
  }
  drawTrend();
}

function render(rows) {
  allRows = rows;
  const totalMins = rows.reduce((s,r) => s + r.actualDur, 0);
  const totalHours = totalMins / 60, totalDays = totalHours / 24;
  const avgDur = avg(rows.map(r => r.actualDur));
  const minRow = rows.reduce((a,b) => a.actualDur < b.actualDur ? a : b);
  const maxRow = rows.reduce((a,b) => a.actualDur > b.actualDur ? a : b);
  const morning = rows.filter(r => r.tod === 'Morning');
  const night = rows.filter(r => r.tod === 'Night');
  const avgM = Math.round(avg(morning.map(r => r.actualDur)));
  const avgN = Math.round(avg(night.map(r => r.actualDur)));
  const maxMN = Math.max(avgM, avgN) * 1.15;

  document.getElementById('last-ride').textContent = 'Last ride: ' + rows[rows.length-1].date;
  document.getElementById('data-range').textContent = rows.length + ' rides loaded';
  document.getElementById('footer-count').textContent = rows.length;

  // ---- KPI TILES ----
  const kpiRides = `<div class="kpi">
    <div class="kpi-label">Total Rides</div>
    <div class="kpi-value">${rows.length}</div>
    <div class="kpi-sub-detail">
      <span style="color:var(--morning)">▲ ${morning.length} morning</span><br>
      <span style="color:#7aaae0">▼ ${night.length} night</span>
    </div>
  </div>`;

  const kpiHours = `<div class="kpi blue">
    <div class="kpi-label">Total Hours on Bus</div>
    <div class="kpi-value">${totalHours.toFixed(1)}h</div>
    <div class="kpi-sub">${totalDays.toFixed(1)} full days of your life</div>
  </div>`;

  const mnBarHTML = [
    {label:'Morning', val:avgM, color:MORNING_COLOR, cls:'morning'},
    {label:'Night',   val:avgN, color:NIGHT_COLOR,   cls:'night'}
  ].map(d => `<div class="mn-bar-row">
    <div class="mn-bar-lbl ${d.cls}">${d.label}</div>
    <div class="mn-bar-track">
      <div class="mn-bar-fill" style="width:${(d.val/maxMN*100).toFixed(1)}%;background:${d.color}">${fmtMins(d.val)}</div>
    </div>
  </div>`).join('');
  const kpiMN = `<div class="kpi">
    <div class="kpi-label">Avg Duration · M vs N</div>
    <div class="mn-bar-wrap">${mnBarHTML}</div>
  </div>`;

  const kpiStats = `<div class="kpi" style="grid-column:span 3">
    <div class="kpi-label">Ride Stats</div>
    <div class="ride-stat-row">
      <div class="ride-stat">
        <div class="ride-stat-label">Avg</div>
        <div class="ride-stat-val">${fmtMins(Math.round(avgDur))}</div>
        <div class="ride-stat-meta">all rides</div>
      </div>
      <div class="ride-stat-divider"></div>
      <div class="ride-stat">
        <div class="ride-stat-label" style="color:var(--green)">Best</div>
        <div class="ride-stat-val" style="color:var(--green)">${fmtMins(minRow.actualDur)}</div>
        <div class="ride-stat-meta">${minRow.date} · ${minRow.pickup || minRow.tod}</div>
      </div>
      <div class="ride-stat-divider"></div>
      <div class="ride-stat">
        <div class="ride-stat-label" style="color:var(--red)">Worst</div>
        <div class="ride-stat-val" style="color:var(--red)">${fmtMins(maxRow.actualDur)}</div>
        <div class="ride-stat-meta">${maxRow.date} · ${maxRow.pickup || maxRow.tod}</div>
      </div>
    </div>
  </div>`;

  // ---- ROUTE TABLE ----
  const byPickup = {};
  for (const r of rows) {
    const key = r.pickup || 'Unknown';
    if (!byPickup[key]) byPickup[key] = { durations: [], delays: [], tod: r.tod };
    byPickup[key].durations.push(r.actualDur);
    if (r.delay !== null) byPickup[key].delays.push(r.delay);
  }
  const routeEntries = Object.entries(byPickup).sort((a,b) => toTimeMinutes(a[0]) - toTimeMinutes(b[0]));

  function buildRouteTable(filterFavs) {
    const favs = getFavs();
    let html = `<table><thead><tr>
      <th></th><th>Departure</th><th>TOD</th><th>Rides</th><th>Avg</th><th>Max</th><th>Min</th><th>Avg Delay</th>
    </tr></thead><tbody>`;
    for (const [pickup, data] of routeEntries) {
      const isFav = favs.includes(pickup);
      if (filterFavs && !isFav) continue;
      const n = data.durations.length, a = Math.round(avg(data.durations));
      const mx = Math.max(...data.durations), mn = Math.min(...data.durations);
      const d = data.delays.length ? Math.round(avg(data.delays)) : null;
      const dClass = d > 5 ? 'delay-pos' : d < -5 ? 'delay-neg' : 'delay-zero';
      const tagCls = data.tod === 'Morning' ? 'tag-morning' : 'tag-night';
      html += `<tr>
        <td><button class="star-btn ${isFav?'active':''}" onclick="toggleFav('${pickup.replace(/'/g,"\\'")}', this)">★</button></td>
        <td>${pickup}</td>
        <td><span class="tag ${tagCls}">${data.tod}</span></td>
        <td>${n}</td><td>${fmtMins(a)}</td><td>${fmtMins(mx)}</td><td>${fmtMins(mn)}</td>
        <td class="${dClass}">${d!==null?(d>=0?'+':'')+fmtMins(d):'—'}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    return html;
  }
  window._buildRouteTable = buildRouteTable;

  // ---- VERTICAL STACKED BAR CHART ----
  const bucketCounts = bucketLabels.map((_,bi) => ({
    morning: morning.filter(r => getBucket(r.actualDur) === bi).length,
    night:   night.filter(r => getBucket(r.actualDur) === bi).length,
  }));
  const maxTotal = Math.max(...bucketCounts.map(b => b.morning + b.night), 1);

  const vertCols = bucketLabels.map((lbl, bi) => {
    const m = bucketCounts[bi].morning, n = bucketCounts[bi].night, total = m + n;
    const mH = (m / maxTotal * 196).toFixed(1);
    const nH = (n / maxTotal * 196).toFixed(1);
    return `<div class="vert-col-wrap">
      <div class="vert-total">${total}</div>
      <div class="vert-col">
        <div class="vert-seg" style="height:${mH}px;background:${MORNING_COLOR};opacity:0.85"></div>
        <div class="vert-seg" style="height:${nH}px;background:${NIGHT_COLOR};opacity:0.9"></div>
      </div>
      <div class="vert-lbl">${lbl}</div>
    </div>`;
  }).join('');

  const vertChart = `
    <div class="vert-chart-wrap">
      <div class="vert-chart">${vertCols}</div>
      <div class="stacked-legend">
        <div class="legend-item"><div class="legend-dot" style="background:${MORNING_COLOR}"></div><span style="color:var(--morning)">Morning</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:${NIGHT_COLOR}"></div><span style="color:#7aaae0">Night</span></div>
      </div>
    </div>`;

  // ---- TREND CONTROLS ----
  const trendPills = routeEntries.map(([pickup, data]) => {
    const tod = data.tod;
    const isActive = selectedRoutes.includes(pickup);
    const activeCls = isActive ? `active-${tod.toLowerCase()}` : '';
    return `<button class="route-pill ${activeCls}" onclick="toggleRoute('${pickup.replace(/'/g,"\\'")}', '${tod}', this)">${pickup} <span style="opacity:0.6">(${data.durations.length})</span></button>`;
  }).join('');

  // ---- RECENT RIDES ----
  const recentHTML = [...rows].slice(-20).reverse().map(r => {
    const c = dotColor(r.actualDur);
    const delayTxt = r.delay!==null?(r.delay>=0?`+${fmtMins(r.delay)}`:fmtMins(r.delay)):'';
    const dClass = r.delay>5?'delay-pos':r.delay<-5?'delay-neg':'delay-zero';
    return `<div class="tl-row">
      <div class="tl-date">${r.date}</div>
      <div class="tl-dot" style="background:${c}"></div>
      <div>
        <div class="tl-duration">${fmtMins(r.actualDur)}</div>
        <div class="tl-meta">${r.dow==='T'?'Tue':r.dow==='W'?'Wed':'Thu'} · ${r.tod}${delayTxt?` · <span class="${dClass}">${delayTxt}</span>`:''}</div>
      </div>
    </div>`;
  }).join('');

  // ---- RENDER HTML ----
  document.getElementById('main-content').innerHTML = `
    <div class="kpi-row">
      ${kpiRides}${kpiHours}${kpiMN}${kpiStats}
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;">
          <span>By Route (Departure Time)</span>
          <button class="filter-fav-btn" id="fav-filter-btn" onclick="toggleFavFilter()">★ Favorites only</button>
        </div>
        <div id="route-table-wrap">${buildRouteTable(false)}</div>
      </div>
      <div class="card">
        <div class="section-title">Duration Distribution · Morning vs Night</div>
        ${vertChart}
      </div>
    </div>
    <div class="card">
      <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;">
        <span>Ride Duration Trend · By Route</span>
        <div class="trend-toggle">
          <button class="trend-toggle-btn active" id="trendToggleChrono" onclick="setTrendMode('chrono')">Chronological</button>
          <button class="trend-toggle-btn" id="trendToggleCount" onclick="setTrendMode('count')">By Count</button>
        </div>
      </div>
      <div class="trend-controls">${trendPills}</div>
      <div class="trend-canvas-wrap">
        <canvas id="trendCanvas"></canvas>
        <div id="trendEmpty" class="trend-empty">Select a route above to view its trend</div>
      </div>
      <div class="trend-legend" id="trendLegend"></div>
    </div>
    <div class="card">
      <div class="section-title">Recent Rides</div>
      <div class="timeline">${recentHTML}</div>
    </div>
  `;

  // Draw trend after DOM is ready
  setTimeout(drawTrend, 50);
}

function getFavs() {
  try { return JSON.parse(localStorage.getItem('bus_favs') || '[]'); } catch { return []; }
}
function toggleFav(pickup, btn) {
  let favs = getFavs();
  if (favs.includes(pickup)) { favs = favs.filter(f => f !== pickup); btn.classList.remove('active'); }
  else { favs.push(pickup); btn.classList.add('active'); }
  localStorage.setItem('bus_favs', JSON.stringify(favs));
  const filterBtn = document.getElementById('fav-filter-btn');
  if (filterBtn && filterBtn.classList.contains('active'))
    document.getElementById('route-table-wrap').innerHTML = window._buildRouteTable(true);
}
function toggleFavFilter() {
  const btn = document.getElementById('fav-filter-btn');
  btn.classList.toggle('active');
  document.getElementById('route-table-wrap').innerHTML = window._buildRouteTable(btn.classList.contains('active'));
}

async function loadData() {
  document.getElementById('main-content').innerHTML = `<div class="loading"><div class="loading-spinner"></div><p>Fetching your commute data...</p></div>`;
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length === 0) throw new Error('No valid ride data found');
    render(rows);
  } catch(err) {
    document.getElementById('main-content').innerHTML = `<div class="error-msg">⚠ Could not load data.<br><span style="font-size:11px">Error: ${err.message}</span></div>`;
  }
}

loadData();
</script>
</body>
</html>
